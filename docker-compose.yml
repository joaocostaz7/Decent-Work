version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: freelance-postgres
    environment:
      POSTGRES_DB: freelance_marketplace
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - freelance-network

  redis:
    image: redis:7-alpine
    container_name: freelance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - freelance-network

volumes:
  postgres_data:
  redis_data:

networks:
  freelance-network:
    driver: bridge
